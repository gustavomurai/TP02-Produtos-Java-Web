<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Produto - TP02</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --bg-base: #0F0F11;
            --bg-surface: #18181B;
            --bg-input: #121214;
            --border-color: #3F3F46;
            --brand-primary: #6366F1;
            --brand-hover: #4F46E5;
            --text-primary: #F4F4F5;
            --text-secondary: #A1A1AA;
            --radius-md: 12px;
            --radius-sm: 8px;
            --transition-fast: 0.2s ease;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            padding: 40px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .surface-card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            font-size: 1.25rem;
            font-weight: 600;
        }

        /* Inputs Customizados - UI Senior */
        .form-label-ui {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-control-ui {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            font-size: 0.95rem;
            transition: var(--transition-fast);
            width: 100%;
        }

        .form-control-ui:focus {
            outline: none;
            border-color: var(--brand-primary);
            box-shadow: 0 0 0 1px var(--brand-primary); /* Foco sutil e nítido */
            background-color: #1A1A1E;
        }

        /* Ocultar as setinhas chatas de inputs numéricos */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        /* Botões UI (Consistência com o Index) */
        .btn-ui {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            height: 48px;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-weight: 500;
            transition: var(--transition-fast);
            width: 100%;
            border: none;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-primary-ui {
            background-color: var(--brand-primary);
            color: #ffffff;
            margin-bottom: 12px;
        }

        .btn-primary-ui:hover {
            background-color: var(--brand-hover);
            transform: translateY(-1px);
        }

        .btn-ghost-ui {
            background-color: transparent;
            color: var(--text-secondary);
            border: 1px solid transparent;
        }

        .btn-ghost-ui:hover {
            color: var(--text-primary);
            background-color: rgba(255, 255, 255, 0.05);
        }
        
        .row-gap {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="surface-card">
        
        <div class="header-title">
            <i class="bi bi-box-seam text-primary" style="color: var(--brand-primary) !important;"></i>
            Novo Produto
        </div>
        
        <form action="SaveServlet" method="post">
            
            <div class="row-gap">
                <label for="nome" class="form-label-ui">NOME DO PRODUTO</label>
                <input type="text" class="form-control-ui" id="nome" name="nome" placeholder="Ex: Monitor Alienware" required>
            </div>

            <div class="row-gap">
                <label for="descricao" class="form-label-ui">DESCRIÇÃO</label>
                <textarea class="form-control-ui" id="descricao" name="descricao" rows="3" placeholder="Detalhes técnicos do produto..." required></textarea>
            </div>

            <div class="row row-gap">
                <div class="col-md-4 mb-3 mb-md-0">
                    <label for="unidadeCompra" class="form-label-ui">UNID. COMPRA</label>
                    <input type="number" class="form-control-ui" id="unidadeCompra" name="unidadeCompra" placeholder="0" required>
                </div>
                
                <div class="col-md-4 mb-3 mb-md-0">
                    <label for="qtdPrevistoMes" class="form-label-ui">QTD. MÊS</label>
                    <input type="number" step="0.01" class="form-control-ui" id="qtdPrevistoMes" name="qtdPrevistoMes" placeholder="0.0" required>
                </div>

                <div class="col-md-4">
                    <label for="precoMaxComprado" class="form-label-ui">PREÇO MÁX. (R$)</label>
                    <input type="number" step="0.01" class="form-control-ui" id="precoMaxComprado" name="precoMaxComprado" placeholder="0.00" required>
                </div>
            </div>

            <div class="mt-4 pt-2 border-top border-secondary-subtle" style="border-color: var(--border-color) !important;">
                <button type="submit" class="btn-ui btn-primary-ui mt-3">
                    <i class="bi bi-check2"></i> Salvar Produto
                </button>
                <a href="index.html" class="btn-ui btn-ghost-ui">
                    <i class="bi bi-arrow-left"></i> Voltar ao Menu
                </a>
            </div>

        </form>
    </div>
</div>

</body>
</html>
